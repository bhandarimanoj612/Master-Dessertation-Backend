spring:
  application:
    name: Sajilo Tayaar

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sajilo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: ${DDL_AUTO:update}


  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  upload:
    dir: ${UPLOAD_DIR:uploads/verification}
    base-url: ${UPLOAD_BASE_URL:http://localhost:8080/uploads/verification}
